<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>jkkoo</title>

<meta name="robots" content="noindex,nofollow"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body {
    background:#fafafa;
    color:#111;
    font-family:'Manrope',sans-serif;
    -webkit-tap-highlight-color: transparent;
}

.hero-title {
    font-family:'Playfair Display',serif;
    letter-spacing:-0.04em;
}

.grid-photo {
    aspect-ratio: 4/5;
}

.fade {
    animation:fade .4s ease;
}

@keyframes fade {
    from {
        opacity:0;
        transform:translateY(8px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}

.lb-bg {
    background:rgba(0,0,0,.96);
    backdrop-filter: blur(12px);
}

.tour-step {
    animation:tour .35s ease;
}

@keyframes tour {
    from {
        opacity:0;
        transform:translateY(20px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="relative w-full">

    <div class="absolute top-4 left-0 right-0 z-20 flex justify-center gap-3 px-4">

        <a href="https://wa.me/5538999320748"
           target="_blank"
           class="bg-white/90 backdrop-blur px-4 py-2 rounded-full text-sm font-medium shadow-sm">
            WhatsApp
        </a>

        <a href="https://instagram.com/lancaster_a.i_studio"
           target="_blank"
           class="bg-white/90 backdrop-blur px-4 py-2 rounded-full text-sm font-medium shadow-sm">
            Instagram
        </a>

    </div>

    <div id="heroImage"
         class="w-full h-[58vh] md:h-[72vh] bg-neutral-200 overflow-hidden">

        <img id="heroImgTag"
             src="IMG_0387.webp"
             class="w-full h-full object-cover"/>

    </div>

    <div class="absolute inset-0 bg-black/10"></div>

    <div class="absolute bottom-10 left-0 right-0 text-center text-white px-6">

        <h1 class="hero-title text-5xl md:text-7xl font-semibold">
            jkkoo
        </h1>

        <p class="mt-3 tracking-[0.25em] uppercase text-xs md:text-sm opacity-90">
            Lancaster Studio
        </p>

    </div>

</section>

<!-- GRID -->
<section class="max-w-7xl mx-auto px-2 md:px-4 py-3">

    <div id="feedGrid"
         class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2 md:gap-3">
    </div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox"
     class="fixed inset-0 z-50 hidden lb-bg">

    <button onclick="closeLightbox()"
            class="absolute top-4 right-4 z-50 bg-white/10 backdrop-blur text-white rounded-full p-3">
        ✕
    </button>

    <div class="w-full h-full flex items-center justify-center">

        <img id="lbImage"
             class="max-w-[94vw] max-h-[92vh] object-contain"/>

    </div>

    <!-- ações -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3">

        <button onclick="toggleLike()"
                class="bg-white text-black rounded-full px-5 py-3 text-sm font-semibold">
            ❤️ Curtir
        </button>

        <button onclick="shareWhats()"
                class="bg-white text-black rounded-full px-5 py-3 text-sm font-semibold">
            Compartilhar
        </button>

        <button onclick="ocultarFotoAtual()"
                class="bg-red-500 text-white rounded-full px-5 py-3 text-sm font-semibold">
            Ocultar
        </button>

    </div>

</div>

<!-- TOUR -->
<div id="tourOverlay"
     class="hidden fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm">

    <div class="w-full h-full flex items-center justify-center px-6">

        <div class="tour-step bg-white rounded-3xl max-w-md w-full p-8 text-center">

            <div id="tourContent"></div>

            <button onclick="nextTour()"
                    class="mt-6 bg-black text-white px-6 py-3 rounded-full">
                Continuar
            </button>

        </div>

    </div>

</div>


    </section>

</div>

<script>

const PHOTOS = ["IMG_0387.webp", "IMG_0387 (1).webp", "IMG_0385.webp", "IMG_0385 (2).webp", "IMG_0385 (2) (1).webp", "IMG_0385 (1).webp", "IMG_0383.webp", "IMG_0383 (2).webp", "IMG_0383 (1).webp", "IMG_0383 (1) (1).webp", "IMG_0381.webp", "IMG_0381 (4).webp", "IMG_0381 (3).webp", "IMG_0381 (2).webp", "IMG_0381 (1).webp"];

const EVENT_SLUG = "jkkoo";

const SUPABASE_URL = "https://iofnwlxoldbcjscrdcun.supabase.co";
const SUPABASE_KEY = "sb_publishable_MgJ4Lhkabl2eAtBSJZBDGA_a2uTK4G2";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentIndex = 0;
let likesCache = {};
let hiddenGlobal = new Set();

const DEVICE_ID =
localStorage.getItem("bolt_uid") ||
Math.random().toString(36).slice(2);

localStorage.setItem("bolt_uid", DEVICE_ID);


// =============================================================================
// GRID
// =============================================================================

function fotosVisiveis() {
    return PHOTOS.filter(f => !hiddenGlobal.has(f));
}

function renderFeed() {

    const grid = document.getElementById("feedGrid");

    grid.innerHTML = fotosVisiveis().map((src, idx) => {

        const likes = likesCache[src] || 0;

        return `
        <div class="fade group relative overflow-hidden bg-neutral-100 cursor-pointer grid-photo"
             onclick="openLightbox(${idx})">

            <img src="${src}"
                 loading="lazy"
                 class="w-full h-full object-cover transition duration-500 group-hover:scale-[1.02]"/>

            <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-semibold">
                ❤️ ${likes}
            </div>

        </div>
        `;

    }).join('');
}


// =============================================================================
// LIGHTBOX
// =============================================================================

function openLightbox(idx) {

    currentIndex = idx;

    document.getElementById("lightbox")
    .classList.remove("hidden");

    document.getElementById("lbImage").src =
    fotosVisiveis()[idx];

}

function closeLightbox() {
    document.getElementById("lightbox")
    .classList.add("hidden");
}

function shareWhats() {

    const foto = fotosVisiveis()[currentIndex];

    const url =
    window.location.origin + "/" + foto;

    window.open(
        "https://api.whatsapp.com/send?text=" +
        encodeURIComponent(url),
        "_blank"
    );
}


// =============================================================================
// LIKES
// =============================================================================

async function didILike(src) {

    const { data } = await sb
    .from("likes")
    .select("id")
    .eq("evento_slug", EVENT_SLUG)
    .eq("foto", src)
    .eq("device_id", DEVICE_ID);

    return data && data.length > 0;
}

async function toggleLike() {

    const src = fotosVisiveis()[currentIndex];

    const liked = await didILike(src);

    if (liked) {

        await sb.from("likes")
        .delete()
        .eq("evento_slug", EVENT_SLUG)
        .eq("foto", src)
        .eq("device_id", DEVICE_ID);

    } else {

        await sb.from("likes")
        .insert({
            evento_slug: EVENT_SLUG,
            foto: src,
            device_id: DEVICE_ID
        });
    }

    updateCounts();
}

async function updateCounts() {

    try {

        const { data } = await sb
        .from("likes")
        .select("foto")
        .eq("evento_slug", EVENT_SLUG);

        likesCache = {};

        if (data) {

            data.forEach(r => {
                likesCache[r.foto] =
                (likesCache[r.foto] || 0) + 1;
            });
        }

        // ordena pelas curtidas
        PHOTOS.sort((a,b) => {
            return (likesCache[b]||0) - (likesCache[a]||0);
        });

        renderFeed();

        atualizarHero();

    } catch(e) {
        console.log("offline likes");
    }
}


// =============================================================================
// HERO DINÂMICO
// =============================================================================

function atualizarHero() {

    const topPhoto = PHOTOS[0];

    if (!topPhoto) return;

    const hero = document.getElementById("heroImgTag");

    hero.style.opacity = 0;

    setTimeout(() => {
        hero.src = topPhoto;
        hero.style.opacity = 1;
    }, 250);
}


// =============================================================================
// OCULTAR FOTO
// =============================================================================

async function carregarFotosOcultas() {

    try {

        const { data } = await sb
        .from("fotos_ocultas")
        .select("foto")
        .eq("evento_slug", EVENT_SLUG);

        hiddenGlobal = new Set(
            (data || []).map(r => r.foto)
        );

    } catch(e) {
        console.log("offline ocultas");
    }
}

async function ocultarFotoAtual() {

    const src = fotosVisiveis()[currentIndex];

    if (!confirm("Ocultar esta foto para todos?"))
    return;

    try {

        await sb
        .from("fotos_ocultas")
        .insert({
            evento_slug: EVENT_SLUG,
            foto: src
        });

    } catch(e) {
        console.log(e);
    }

    hiddenGlobal.add(src);

    closeLightbox();

    renderFeed();
}


// =============================================================================
// TOUR
// =============================================================================

const TOUR_STEPS = [

`
<h2 class="text-2xl font-semibold mb-4">
❤️ Curtidas
</h2>

<p class="text-neutral-600">
As fotos mais curtidas automaticamente sobem para o topo da galeria.
</p>
`,

`
<h2 class="text-2xl font-semibold mb-4">
📲 Compartilhe
</h2>

<p class="text-neutral-600">
Abra qualquer foto e use o botão de compartilhar via WhatsApp.
</p>
`,

`
<h2 class="text-2xl font-semibold mb-4">
🙈 Ocultar fotos
</h2>

<p class="text-neutral-600">
Encontrou uma foto indesejada?
Você pode ocultá-la para todos os convidados.
</p>
`
];

let tourIndex = 0;

function iniciarTour() {

    if (localStorage.getItem("tour_ok"))
    return;

    document.getElementById("tourOverlay")
    .classList.remove("hidden");

    renderTour();
}

function renderTour() {
    document.getElementById("tourContent")
    .innerHTML = TOUR_STEPS[tourIndex];
}

function nextTour() {

    tourIndex++;

    if (tourIndex >= TOUR_STEPS.length) {

        localStorage.setItem("tour_ok", "1");

        document.getElementById("tourOverlay")
        .classList.add("hidden");

        return;
    }

    renderTour();
}


// =============================================================================

// =============================================================================
// INIT
// =============================================================================

async function iniciarPagina() {

    await carregarFotosOcultas();

    renderFeed();

    updateCounts();

    renderPartners();

    iniciarTour();
}

iniciarPagina();


// =============================================================================
// AUTO REFRESH / RESILIÊNCIA REDE
// =============================================================================

setInterval(async () => {

    try {
        await updateCounts();
    } catch(e) {
        console.log("falha atualização");
    }

}, 10000);

</script>

</body>
</html>
